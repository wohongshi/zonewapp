name: zonewapp
description: 山东省综合评价平台自动填写工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  webview_flutter: ^4.4.4
  dio: ^5.4.0
  percent_indicator: ^4.2.3
  image_picker: ^1.1.0
  file_picker: ^8.0.0
  flutter_local_notifications: ^18.0.0
  uuid: ^4.3.3
  intl: ^0.19.0
  json_annotation: ^4.8.1
  collection: ^1.18.0
  url_launcher: ^6.2.2
  dynamic_color: ^1.7.0
  xterm: ^3.5.0
  flutter_pty: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
