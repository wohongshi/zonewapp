name: zonewapp
description: 山东省综合评价平台自动填写工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  
  # WebView
  webview_flutter: ^4.4.4
  webview_flutter_android: ^3.14.0
  
  # HTTP & Networking
  dio: ^5.4.0
  
  # UI Components
  dynamic_color: ^1.7.0
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  
  # File & Image
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  screenshot: ^2.1.0
  
  # Notification
  flutter_local_notifications: ^16.3.2
  
  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  json_annotation: ^4.8.1
  collection: ^1.18.0
  
  # URL Launcher
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
