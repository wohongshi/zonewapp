name: zonewapp
description: 山东省综合评价平台自动填写工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  
  # WebView
  webview_flutter: ^4.4.4
  webview_flutter_android: ^3.14.0
  webview_windows: ^0.2.3
  
  # HTTP & Networking
  dio: ^5.4.0
  http: ^1.2.0
  
  # UI Components
  dynamic_color: ^1.7.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  
  # File & Image
  image_picker: ^1.0.7
  image: ^4.1.7
  screenshot: ^2.1.0
  file_picker: ^6.1.1
  path: ^1.8.3
  
  # Notification
  flutter_local_notifications: ^16.3.2
  
  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1
  encrypt: ^5.0.3
  collection: ^1.18.0
  
  # Rust Bridge
  flutter_rust_bridge: ^2.1.0
  rust_lib_zonewapp:
    path: rust_builder
  
  # Web Server (for hidden feature)
  shelf: ^1.4.1
  shelf_static: ^1.1.2
  shelf_web_socket: ^1.0.3
  
  # URL Launcher
  url_launcher: ^6.2.2
  
  # System Theme
  system_theme: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  flutter_rust_bridge_codegen: ^2.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/web/
  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700
